AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Project:
    Type: String
  ProjectLower:
    Type: String
  Environment:
    Type: String

Resources:
  OrganizerEventsTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub '${Project}-ORGANIZER-EVENTS-${Environment}'
      BillingMode: 'PAY_PER_REQUEST'
      AttributeDefinitions:
        - AttributeName: "organizerId"
          AttributeType: "S"
        - AttributeName: "monthId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "organizerId"
          KeyType: "HASH"
        - AttributeName: "monthId"
          KeyType: "RANGE"
      GlobalSecondaryIndexes:
        - IndexName: !Sub "monthIndex"
          KeySchema:
            - AttributeName: "monthId"
              KeyType: "HASH"
          Projection:
            ProjectionType: "KEYS_ONLY"

  ConfigurationTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub '${Project}-CONFIGURATION-${Environment}'
      BillingMode: 'PAY_PER_REQUEST'
      AttributeDefinitions:
        - AttributeName: "id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "id"
          KeyType: "HASH"
