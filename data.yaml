AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  Project:
    Type: String
  ProjectLower:
    Type: String
  Environment:
    Type: String

Resources:
  OrganizerEventsTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub '${Project}-ORGANIZER-EVENT-BUNDLE-${Environment}'
      BillingMode: 'PAY_PER_REQUEST'
      AttributeDefinitions:
        - AttributeName: "organizerId"
          AttributeType: "S"
        - AttributeName: "month"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "organizerId"
          KeyType: "HASH"
        - AttributeName: "month"
          KeyType: "RANGE"
      GlobalSecondaryIndexes:
        - IndexName: !Sub "monthIndex"
          KeySchema:
            - AttributeName: "month"
              KeyType: "HASH"
          Projection:
            ProjectionType: "KEYS_ONLY"

  ConfigurationTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub '${Project}-CONFIGURATION-${Environment}'
      BillingMode: 'PAY_PER_REQUEST'
      AttributeDefinitions:
        - AttributeName: "id"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "id"
          KeyType: "HASH"

  SubscribersTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub '${Project}-SUBSCRIBER-${Environment}'
      BillingMode: 'PAY_PER_REQUEST'
      AttributeDefinitions:
        - AttributeName: "email"
          AttributeType: "S"
        - AttributeName: "activationCode"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "email"
          KeyType: "HASH"
      GlobalSecondaryIndexes:
        - IndexName: !Sub "activationCodeIndex"
          KeySchema:
            - AttributeName: "activationCode"
              KeyType: "HASH"
          Projection:
            ProjectionType: "KEYS_ONLY"

  DSQLCluster:
    Type: 'AWS::DSQL::Cluster'
    Properties:
      DeletionProtectionEnabled: false
      Tags:
        - Key: 'Project'
          Value: !Ref Project
        - Key: 'Environment'
          Value: !Ref Environment

Outputs:
  DSQLClusterIdentifier:
    Value: !GetAtt DSQLCluster.Identifier
    Export:
      Name: !Sub '${Project}-${Environment}::DSQL::Cluster::Identifier'
  DSQLClusterEndpoint:
    Value: !GetAtt DSQLCluster.Endpoint
    Export:
      Name: !Sub '${Project}-${Environment}::DSQL::Cluster::Endpoint'
